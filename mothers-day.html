<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>母亲节快乐</title>
<style>
@import url('https://fonts.googleapis.cn/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap');

:root {
  --bg: #F8F4EF;
  --rose: #E8B8B8;
  --sage: #B0C8A8;
  --gold: #EDD4A8;
  --ocean: #8EC5D0;
  --ocean-light: #B8DDE5;
  --text: #4A5A56;
  --text-light: #8A9A96;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Lora', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  min-height: 100vh;
}

#petalCanvas {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  z-index: 0;
  pointer-events: none;
}

/* ===== SECTION BASE ===== */
.section {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  width: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 3rem 1.5rem;
  overflow: hidden;
}

.section-inner {
  opacity: 0;
  transform: translateY(50px);
  transition: opacity 1s cubic-bezier(0.22, 1, 0.36, 1),
              transform 1s cubic-bezier(0.22, 1, 0.36, 1);
  width: 100%;
  max-width: 900px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.section-inner.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ===== HERO ===== */
.hero { background: radial-gradient(ellipse at 50% 30%, rgba(237,212,168,0.2) 0%, rgba(142,197,208,0.08) 70%); }

.hero-title {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: clamp(1.6rem, 4.5vw, 3.2rem);
  text-align: center;
  line-height: 1.7;
  max-width: 800px;
  background: linear-gradient(90deg, #E8C89A 0%, #EDD4A8 20%, #F5E4C0 40%, #EDD4A8 60%, #E8C89A 80%, #EDD4A8 100%);
  background-size: 300% auto;
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 30px rgba(237,212,168,0.3));
  animation: shimmer 5s ease-in-out infinite;
}

@keyframes shimmer {
  0% { background-position: 0% center; }
  50% { background-position: 100% center; }
  100% { background-position: 0% center; }
}

.hero-subtitle {
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: clamp(1rem, 2vw, 1.4rem);
  color: var(--ocean);
  margin-top: 1.8rem;
  letter-spacing: 0.3em;
  opacity: 0;
  animation: fadeInUp 1.5s ease 0.5s forwards;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.hero-decor {
  margin-top: 2.5rem;
  display: flex;
  gap: 0.6rem;
}

.hero-decor span {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  opacity: 0.4;
  animation: decorPulse 3s ease-in-out infinite;
}

.hero-decor span:nth-child(1) { background: var(--ocean); }
.hero-decor span:nth-child(2) { background: var(--gold); }
.hero-decor span:nth-child(3) { background: var(--sage); }
.hero-decor span:nth-child(4) { background: var(--ocean-light); }
.hero-decor span:nth-child(5) { background: var(--gold); }
.hero-decor span:nth-child(2) { animation-delay: 0.5s; }
.hero-decor span:nth-child(3) { animation-delay: 1s; }
.hero-decor span:nth-child(4) { animation-delay: 1.5s; }
.hero-decor span:nth-child(5) { animation-delay: 2s; }

@keyframes decorPulse {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.3); }
}

.scroll-hint {
  position: absolute;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.8rem;
  color: var(--text-light);
  opacity: 0.5;
  animation: bounceDown 2s ease-in-out infinite;
}

@keyframes bounceDown {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(8px); }
}

/* ===== GALLERY ===== */
.gallery {
  background: linear-gradient(180deg, rgba(142,197,208,0.06) 0%, rgba(176,200,168,0.1) 50%, rgba(142,197,208,0.06) 100%);
}

.section-label {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.5rem, 3vw, 2.2rem);
  color: var(--ocean);
  margin-bottom: 2rem;
  text-align: center;
}

.section-label::after {
  content: '';
  display: block;
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0.6rem auto 0;
}

.photo-scroll-wrap {
  width: 100%;
  max-width: 700px;
  overflow: hidden;
  position: relative;
  border-radius: 16px;
  padding: 1rem 0;
}

.photo-scroll-wrap::before,
.photo-scroll-wrap::after {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  width: 80px;
  z-index: 2;
  pointer-events: none;
}

.photo-scroll-wrap::before {
  left: 0;
  background: linear-gradient(90deg, rgba(248,244,239,0.95) 0%, transparent 100%);
}

.photo-scroll-wrap::after {
  right: 0;
  background: linear-gradient(270deg, rgba(248,244,239,0.95) 0%, transparent 100%);
}

.photo-track {
  display: flex;
  gap: 1.2rem;
  width: max-content;
  will-change: transform;
}

.photo-card {
  flex: 0 0 280px;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
              box-shadow 0.5s ease;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  aspect-ratio: 4 / 3;
}

.photo-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
}

.photo-card .overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(142,197,208,0.25), rgba(237,212,168,0.15));
  opacity: 0;
  transition: opacity 0.5s ease;
}

.photo-card:hover {
  transform: scale(1.05);
  box-shadow: 0 12px 40px rgba(142,197,208,0.25);
}

.photo-card:hover img {
  transform: scale(1.08);
}

.photo-card:hover .overlay {
  opacity: 1;
}

@media (max-width: 600px) {
  .photo-card { flex: 0 0 220px; }
}

/* ===== GIFT ===== */
.gift {
  background: radial-gradient(ellipse at 50% 70%, rgba(237,212,168,0.18) 0%, rgba(176,200,168,0.08) 70%);
}

.gift-stage {
  position: relative;
  width: 260px;
  height: 340px;
  perspective: 900px;
  margin: 0 auto;
  cursor: pointer;
}

.gift-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 400px;
}

/* ---- Flower Assembly ---- */
.flower-assembly {
  position: absolute;
  bottom: 130px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  z-index: 0;
  opacity: 0;
  transition: all 1.5s cubic-bezier(0.22, 1, 0.36, 1) 0.4s;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.gift-stage.open .flower-assembly {
  transform: translateX(-50%) translateY(-20px);
  opacity: 1;
  z-index: 5;
}

/* Rose */
.rose {
  position: relative;
  width: 110px;
  height: 110px;
  flex-shrink: 0;
}

.petal {
  position: absolute;
  bottom: 50%;
  left: 50%;
  border-radius: 50%;
  transform-origin: center bottom;
  opacity: 0.88;
}

/* Outer layer: 5 petals, 40px */
.petal:nth-child(1),
.petal:nth-child(2),
.petal:nth-child(3),
.petal:nth-child(4),
.petal:nth-child(5) {
  width: 40px;
  height: 40px;
  margin-left: -20px;
}

.petal:nth-child(1)  { transform: rotate(0deg);   background: linear-gradient(to top, #E04A4A, #FF9A9A); }
.petal:nth-child(2)  { transform: rotate(72deg);  background: linear-gradient(to top, #D63031, #FF8A8A); }
.petal:nth-child(3)  { transform: rotate(144deg); background: linear-gradient(to top, #E04A4A, #FF9A9A); }
.petal:nth-child(4)  { transform: rotate(216deg); background: linear-gradient(to top, #D63031, #FF8A8A); }
.petal:nth-child(5)  { transform: rotate(288deg); background: linear-gradient(to top, #E04A4A, #FF9A9A); }

/* Middle layer: 5 petals, 32px */
.petal:nth-child(6),
.petal:nth-child(7),
.petal:nth-child(8),
.petal:nth-child(9),
.petal:nth-child(10) {
  width: 32px;
  height: 32px;
  margin-left: -16px;
}

.petal:nth-child(6)  { transform: rotate(36deg);  background: linear-gradient(to top, #C0392B, #E04A4A); }
.petal:nth-child(7)  { transform: rotate(108deg); background: linear-gradient(to top, #A93226, #D63031); }
.petal:nth-child(8)  { transform: rotate(180deg); background: linear-gradient(to top, #C0392B, #E04A4A); }
.petal:nth-child(9)  { transform: rotate(252deg); background: linear-gradient(to top, #A93226, #D63031); }
.petal:nth-child(10) { transform: rotate(324deg); background: linear-gradient(to top, #C0392B, #E04A4A); }

/* Inner layer: 5 petals, 24px */
.petal:nth-child(11),
.petal:nth-child(12),
.petal:nth-child(13),
.petal:nth-child(14),
.petal:nth-child(15) {
  width: 24px;
  height: 24px;
  margin-left: -12px;
}

.petal:nth-child(11) { transform: rotate(18deg);  background: linear-gradient(to top, #922B21, #C0392B); }
.petal:nth-child(12) { transform: rotate(90deg);  background: linear-gradient(to top, #7B241C, #A93226); }
.petal:nth-child(13) { transform: rotate(162deg); background: linear-gradient(to top, #922B21, #C0392B); }
.petal:nth-child(14) { transform: rotate(234deg); background: linear-gradient(to top, #7B241C, #A93226); }
.petal:nth-child(15) { transform: rotate(306deg); background: linear-gradient(to top, #922B21, #C0392B); }

.petal-center {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 14px;
  height: 14px;
  margin: -7px 0 0 -7px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, #D63031, #6B1A1A);
  z-index: 3;
  box-shadow: 0 0 6px rgba(200,50,50,0.3);
}

.rose-stem {
  width: 4px;
  height: 65px;
  background: linear-gradient(to top, #2D6A4F, #40916C);
  border-radius: 2px;
  flex-shrink: 0;
  margin-top: -40px;
  z-index: 1;
}

.rose-leaf {
  position: relative;
  width: 80px;
  height: 14px;
  flex-shrink: 0;
  margin-top: -35px;
  z-index: 1;
}

.rose-leaf::before,
.rose-leaf::after {
  content: '';
  position: absolute;
  width: 26px;
  height: 12px;
  background: #40916C;
  border-radius: 0 50% 50% 50%;
}

.rose-leaf::before {
  left: 6px;
  top: 1px;
  transform: rotate(-25deg);
}

.rose-leaf::after {
  right: 6px;
  top: 3px;
  transform: rotate(155deg);
}

/* ---- Gift Box ---- */
.gift-box {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
  width: 200px;
}

.gift-body {
  width: 200px;
  height: 110px;
  background: linear-gradient(160deg, #B8DDE5 0%, #A8D4D8 50%, #8EC5D0 100%);
  border-radius: 0 0 12px 12px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 6px 30px rgba(142,197,208,0.3);
}

.gift-body .ribbon-h {
  position: absolute;
  top: 50%;
  left: 0;
  right: 0;
  height: 18px;
  background: linear-gradient(90deg, #EDD4A8, #F5E4C0, #EDD4A8);
  transform: translateY(-50%);
  z-index: 1;
}

.gift-body .ribbon-v {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 50%;
  width: 18px;
  background: linear-gradient(180deg, #EDD4A8, #F5E4C0, #EDD4A8);
  transform: translateX(-50%);
  z-index: 1;
}

.gift-lid {
  width: 208px;
  height: 42px;
  margin: 0 0 0 -4px;
  background: linear-gradient(160deg, #C8E4E8 0%, #B8DDE5 60%, #A8D4D8 100%);
  border-radius: 10px 10px 0 0;
  position: relative;
  transform-origin: bottom center;
  transition: transform 1.3s cubic-bezier(0.22, 1, 0.36, 1);
  z-index: 4;
  box-shadow: 0 -2px 15px rgba(142,197,208,0.15);
}

.gift-stage.open .gift-lid {
  transform: rotateX(-120deg) translateZ(-5px);
}

.gift-lid .ribbon-h {
  position: absolute;
  top: 50%;
  left: 0;
  right: 0;
  height: 14px;
  background: linear-gradient(90deg, #EDD4A8, #F5E4C0, #EDD4A8);
  transform: translateY(-50%);
  z-index: 1;
}

.gift-lid .ribbon-v {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 50%;
  width: 14px;
  background: linear-gradient(180deg, #EDD4A8, #F5E4C0, #EDD4A8);
  transform: translateX(-50%);
  z-index: 1;
}

.bow {
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  width: 40px;
  height: 30px;
  z-index: 5;
}

.bow::before,
.bow::after {
  content: '';
  position: absolute;
  width: 22px;
  height: 18px;
  background: linear-gradient(135deg, #F5E4C0, #EDD4A8);
  border-radius: 50% 50% 0 50%;
  top: 0;
}

.bow::before {
  left: 2px;
  transform: rotate(-30deg);
}

.bow::after {
  right: 2px;
  transform: rotate(90deg);
}

.bow-center {
  position: absolute;
  top: 6px;
  left: 50%;
  transform: translateX(-50%);
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 40%, #F5E4C0, #D4B880);
  z-index: 2;
}

/* ---- Gift Text ---- */
.gift-hint {
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--text-light);
  transition: opacity 0.6s ease;
  cursor: pointer;
  text-align: center;
  margin-top: 1.8rem;
}

.gift-stage.open ~ .gift-hint {
  opacity: 0;
  pointer-events: none;
}

.gift-message {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.1rem, 2.5vw, 1.6rem);
  color: var(--ocean);
  text-align: center;
  opacity: 0;
  transform: translateY(15px);
  transition: all 1s cubic-bezier(0.22, 1, 0.36, 1) 1.2s;
  line-height: 1.8;
  margin-top: 1rem;
}

.gift-stage.open ~ .gift-message {
  opacity: 1;
  transform: translateY(0);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
  .section { padding: 2rem 1rem; }
  .gift-stage { width: 220px; height: 320px; }
  .gift-box { width: 170px; }
  .gift-body { width: 170px; height: 95px; }
  .gift-lid { width: 178px; margin-left: -4px; height: 36px; }
  .rose { width: 80px; height: 80px; }
  .petal:nth-child(1),
  .petal:nth-child(2),
  .petal:nth-child(3),
  .petal:nth-child(4),
  .petal:nth-child(5) { width: 30px; height: 30px; margin-left: -15px; }
  .petal:nth-child(6),
  .petal:nth-child(7),
  .petal:nth-child(8),
  .petal:nth-child(9),
  .petal:nth-child(10) { width: 24px; height: 24px; margin-left: -12px; }
  .petal:nth-child(11),
  .petal:nth-child(12),
  .petal:nth-child(13),
  .petal:nth-child(14),
  .petal:nth-child(15) { width: 18px; height: 18px; margin-left: -9px; }
  .petal-center { width: 11px; height: 11px; margin: -5.5px 0 0 -5.5px; }
  .rose-stem { height: 45px; }
}
</style>
</head>
<body>

<canvas id="petalCanvas"></canvas>

<!-- ===== HERO ===== -->
<section class="section hero">
  <div class="section-inner">
    <h1 class="hero-title">整个世界都催着我长大，<br>只有您让我做永远的孩子。</h1>
    <p class="hero-subtitle">♥ 2026 母亲节快乐 ♥</p>
    <div class="hero-decor">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>
  <div class="scroll-hint">✦ 向下滑动 ✦</div>
</section>

<!-- ===== GALLERY ===== -->
<section class="section gallery">
  <div class="section-inner">
    <h2 class="section-label">时光放映机</h2>
    <div class="photo-scroll-wrap" id="photoScroll">
      <div class="photo-track" id="photoTrack">
        <div class="photo-card"><img src="图片1.jpg" alt="回忆" loading="lazy"><div class="overlay"></div></div>
        <div class="photo-card"><img src="图片2.jpg" alt="回忆" loading="lazy"><div class="overlay"></div></div>
        <div class="photo-card"><img src="图片1.jpg" alt="回忆" loading="lazy"><div class="overlay"></div></div>
        <div class="photo-card"><img src="图片2.jpg" alt="回忆" loading="lazy"><div class="overlay"></div></div>
      </div>
    </div>
  </div>
</section>

<!-- ===== GIFT ===== -->
<section class="section gift">
  <div class="section-inner">
    <h2 class="section-label">一份心意</h2>
    <div class="gift-wrapper">
      <div class="gift-stage" id="giftStage">
        <div class="gift-box" id="giftBox">
          <div class="gift-lid" id="giftLid">
            <div class="ribbon-h"></div>
            <div class="ribbon-v"></div>
            <div class="bow"><div class="bow-center"></div></div>
          </div>
          <div class="gift-body">
            <div class="ribbon-h"></div>
            <div class="ribbon-v"></div>
          </div>
        </div>
        <div class="flower-assembly" id="flowerAssembly">
          <div class="rose">
            <div class="petal"></div><div class="petal"></div><div class="petal"></div>
            <div class="petal"></div><div class="petal"></div><div class="petal"></div>
            <div class="petal"></div><div class="petal"></div><div class="petal"></div>
            <div class="petal"></div><div class="petal"></div><div class="petal"></div>
            <div class="petal"></div><div class="petal"></div><div class="petal"></div>
            <div class="petal-center"></div>
          </div>
          <div class="rose-stem"></div>
          <div class="rose-leaf"></div>
        </div>
      </div>
      <p class="gift-hint" id="giftHint">点击这里，拆开你的礼物</p>
      <p class="gift-message" id="giftMessage">送您一束永不凋谢的花，母亲节快乐！</p>
    </div>
  </div>
</section>

<script>
(function() {
  'use strict';

  /* ===== PETAL PARTICLES ===== */
  const canvas = document.getElementById('petalCanvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const COLORS = ['#8EC5D0', '#A8D4D8', '#B8DDE5', '#C8E4E8', '#EDD4A8', '#B0C8A8'];
  const HCOLORS = ['#EDD4A8', '#E8C89A', '#8EC5D0', '#B0C8A8'];
  const COUNT = 50;
  const particles = [];

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * W;
      this.y = -Math.random() * H * 1.5;
      this.size = Math.random() * 14 + 10;
      this.speedY = Math.random() * 0.35 + 0.12;
      this.speedX = Math.random() * 0.2 - 0.1;
      this.rot = Math.random() * Math.PI * 2;
      this.rotSpeed = (Math.random() - 0.5) * 0.006;
      this.alpha = Math.random() * 0.2 + 0.12;
      this.type = Math.random() < 0.7 ? 'petal' : 'heart';
      this.color = this.type === 'petal'
        ? COLORS[Math.floor(Math.random() * COLORS.length)]
        : HCOLORS[Math.floor(Math.random() * HCOLORS.length)];
      this.swayAmp = Math.random() * 0.5 + 0.15;
      this.swayFreq = Math.random() * 0.003 + 0.0015;
      this.swayPhase = Math.random() * Math.PI * 2;
    }
    update() {
      this.y += this.speedY;
      this.x += this.speedX + Math.sin(this.y * this.swayFreq + this.swayPhase) * this.swayAmp;
      this.rot += this.rotSpeed;
      if (this.y > H + 30) { this.y = -20; this.x = Math.random() * W; }
    }
    draw(ctx) {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);
      ctx.globalAlpha = this.alpha;
      ctx.fillStyle = this.color;
      const s = this.size;
      ctx.beginPath();
      if (this.type === 'petal') {
        ctx.moveTo(0, -s * 0.7);
        ctx.bezierCurveTo(s * 0.55, -s * 0.4, s * 0.6, s * 0.15, 0, s * 0.5);
        ctx.bezierCurveTo(-s * 0.6, s * 0.15, -s * 0.55, -s * 0.4, 0, -s * 0.7);
      } else {
        const hs = s * 0.7;
        ctx.moveTo(0, hs * 0.3);
        ctx.bezierCurveTo(-hs * 0.9, -hs * 0.1, -hs * 0.7, -hs * 0.7, 0, -hs * 0.3);
        ctx.bezierCurveTo(hs * 0.7, -hs * 0.7, hs * 0.9, -hs * 0.1, 0, hs * 0.3);
      }
      ctx.fill();
      ctx.restore();
    }
  }

  for (let i = 0; i < COUNT; i++) {
    const p = new Particle();
    p.y = Math.random() * H;
    particles.push(p);
  }

  function animateParticles() {
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) { p.update(); p.draw(ctx); }
    requestAnimationFrame(animateParticles);
  }
  animateParticles();

  /* ===== INTERSECTION OBSERVER ===== */
  const observer = new IntersectionObserver((entries) => {
    for (const e of entries) {
      if (e.isIntersecting) { e.target.classList.add('visible'); }
    }
  }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.section-inner').forEach(el => observer.observe(el));

  /* ===== PHOTO AUTO-SCROLL ===== */
  const track = document.getElementById('photoTrack');
  const scrollWrap = document.getElementById('photoScroll');
  let scrollPos = 0;
  let isPaused = false;
  let rafId = null;

  function calcTrackWidth() {
    const first = track.querySelector('.photo-card');
    if (!first) return 0;
    const style = getComputedStyle(track);
    const gap = parseFloat(style.gap) || 0;
    const cards = track.querySelectorAll('.photo-card');
    let w = 0;
    for (let i = 0; i < cards.length / 2; i++) {
      w += cards[i].offsetWidth + gap;
    }
    return w;
  }

  let trackWidth = 0;

  function updateTrackWidth() {
    trackWidth = calcTrackWidth();
  }

  function scrollPhotos() {
    if (!trackWidth) { updateTrackWidth(); }
    if (trackWidth <= 0) { rafId = requestAnimationFrame(scrollPhotos); return; }
    if (!isPaused) {
      scrollPos += 0.4;
      if (scrollPos >= trackWidth) { scrollPos = 0; }
      track.style.transform = 'translateX(-' + scrollPos + 'px)';
    }
    rafId = requestAnimationFrame(scrollPhotos);
  }

  scrollWrap.addEventListener('mouseenter', function() {
    isPaused = true;
    track.style.transition = 'transform 6s linear';
  });

  scrollWrap.addEventListener('mouseleave', function() {
    isPaused = false;
    track.style.transition = 'none';
  });

  scrollWrap.addEventListener('touchstart', function() { isPaused = true; }, { passive: true });

  scrollWrap.addEventListener('touchend', function() {
    setTimeout(function() { isPaused = false; }, 2000);
  }, { passive: true });

  let resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
      updateTrackWidth();
      if (scrollPos > trackWidth) scrollPos = 0;
    }, 300);
  });

  setTimeout(updateTrackWidth, 500);
  scrollPhotos();

  /* ===== GIFT BOX INTERACTION ===== */
  const giftStage = document.getElementById('giftStage');
  let isOpen = false;

  giftStage.addEventListener('click', function() {
    if (isOpen) return;
    isOpen = true;
    giftStage.classList.add('open');
  });
})();
</script>
</body>
